<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greek Island Odyssey | The Top 50</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <style>
        :root { --greek-blue: #005BAE; --white: #ffffff; --sand: #fdf5e6; --accent: #ff7f50; --teal: #20B2AA; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: var(--sand); }
        header { background: var(--greek-blue); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 2000; }
        #islandSearch { width: 100%; max-width: 400px; padding: 12px; border-radius: 25px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); outline: none; }
        
        #home-view { height: calc(100vh - 130px); width: 100%; }
        #main-map { height: 100%; width: 100%; background: #c5e7ff; }

        #detail-view { display: none; padding: 2rem; max-width: 900px; margin: 30px auto; background: white; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .hero-img { width: 100%; height: 350px; object-fit: cover; border-radius: 20px; margin-bottom: 20px; }
        
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin: 20px 0; }
        .info-card { padding: 12px; border-radius: 10px; background: #f8f9fa; border-bottom: 3px solid var(--greek-blue); }
        
        .bar-bg { background: #eee; height: 12px; border-radius: 6px; margin: 8px 0 15px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--greek-blue); width: 0%; transition: width 1s ease-out; }
        
        .back-btn { background: var(--accent); color: white; border: none; padding: 10px 25px; border-radius: 30px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        #island-mini-map { width: 100%; height: 300px; border-radius: 15px; margin: 20px 0; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0 0 10px 0;">Greek Island Odyssey 🏝️</h1>
    <input type="text" id="islandSearch" placeholder="Search 50 islands..." onkeyup="filterIslands()">
</header>

<div id="home-view">
    <div id="main-map"></div>
</div>

<div id="detail-view">
    <button class="back-btn" onclick="showHome()">← Back to Map</button>
    <div style="display:flex; justify-content:space-between; align-items: baseline;">
        <h1 id="island-name" style="color:var(--greek-blue); font-size: 3rem; margin:0;"></h1>
        <h2 id="island-greek" style="color:#aaa; font-weight:normal;"></h2>
    </div>
    <p id="island-cluster" style="color:var(--teal); font-weight:bold; text-transform:uppercase; letter-spacing:1px;"></p>

    <img id="island-img" class="hero-img" src="" alt="Island">

    <div class="info-grid">
        <div class="info-card"><strong>📏 Area:</strong><br><span id="island-size"></span></div>
        <div class="info-card"><strong>🏘️ Cluster:</strong><br><span id="island-cluster-text"></span></div>
        <div class="info-card"><strong>🏛️ Best For:</strong><br><span id="island-vibe"></span></div>
    </div>

    <strong>🏖️ Travel Appeal</strong>
    <div class="bar-bg"><div id="beach-bar" class="bar-fill"></div></div>

    <div id="island-mini-map"></div>
    <p id="island-desc" style="line-height:1.8; color:#444; font-size:1.1rem;"></p>
</div>
