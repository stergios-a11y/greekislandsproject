<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greek Island Finder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

<header>
    <h1>GREEK ISLAND FINDER</h1>
    <div id="version-display"></div>
</header>

<div class="search-container">
    <input type="text" id="islandSearch" placeholder="Search for an island..." onkeyup="filterIslands()">
    <div class="vibe-filters">
        <button class="vibe-chip active" id="btn-overall" onclick="updateMapMode('overall')">🏠 Overall</button>
        <button class="vibe-chip" id="btn-beach" onclick="updateMapMode('beach')">🏖️ Beaches</button>
        <button class="vibe-chip" id="btn-hist" onclick="updateMapMode('hist')">🏛️ Culture</button>
        <button class="vibe-chip" id="btn-night" onclick="updateMapMode('night')">🍷 Nightlife</button>
        <button class="vibe-chip" id="btn-access" onclick="updateMapMode('access')">🚢 Access</button>
        <button class="vibe-chip" id="btn-afford" onclick="updateMapMode('afford')">💸 Price</button>
    </div>
</div>

<main id="home-view">
    <div id="main-map"></div>
    <div class="legend">
        <strong id="legend-title">Overall Rating</strong>: 
        <span class="legend-item"><span class="dot" style="background:#27ae60"></span> ⭐ Elite</span>
        <span class="legend-item"><span class="dot" style="background:#2ecc71"></span> High</span>
        <span class="legend-item"><span class="dot" style="background:#f1c40f"></span> Average</span>
        <span class="legend-item"><span class="dot" style="background:#e67e22"></span> Niche</span>
    </div>
</main>

<main id="detail-view" style="display:none;">
    <button class="back-btn" onclick="showHome()">← Back to Map</button>
    
    <h1 id="island-name"></h1>

    <div class="rating-box">
        <div class="rating-row">
            <span class="rating-label">🏖️ Beach</span>
            <div class="stars-outer"><div id="star-beach" class="stars-inner"></div></div>
        </div>
        <div class="rating-row">
            <span class="rating-label">🏛️ Culture</span>
            <div class="stars-outer"><div id="star-hist" class="stars-inner"></div></div>
        </div>
        <div class="rating-row">
            <span class="rating-label">🍷 Night</span>
            <div class="stars-outer"><div id="star-night" class="stars-inner"></div></div>
        </div>
        <div class="rating-row">
            <span class="rating-label">🚢 Access</span>
            <div class="stars-outer"><div id="star-access" class="stars-inner"></div></div>
        </div>
        <div class="rating-row">
            <span class="rating-label">💸 Price</span>
            <div class="stars-outer"><div id="star-afford" class="stars-inner"></div></div>
        </div>
    </div>

    <img id="island-pic" class="island-hero" src="" alt="Island Image">
    
    <div id="island-mini-map"></div>
    
    <div id="island-guide"></div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>
