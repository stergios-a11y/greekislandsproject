<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greek Island Odyssey | Version 2.0</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="style.css?v=6" />
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="script.js?v=6" defer></script>
</head>
<body>

<header>
    <h1 onclick="showHome()">Greek Island Odyssey 🏝️</h1>
    <input type="text" id="islandSearch" placeholder="Search destinations..." onkeyup="filterIslands()">
    <div class="quick-menu">
        <span class="vibe-chip active" id="btn-overall" onclick="updateMapMode('overall')">🏆 Best Overall</span>
        <span class="vibe-chip" id="btn-beach" onclick="updateMapMode('beach')">🌊 Beach Lovers</span>
        <span class="vibe-chip" id="btn-hist" onclick="updateMapMode('hist')">🏛️ Culture Buffs</span>
        <span class="vibe-chip" id="btn-night" onclick="updateMapMode('night')">💃 Party Animals</span>
        <span class="vibe-chip" id="btn-access" onclick="updateMapMode('access')">🚗 Accessibility</span>
        <span class="vibe-chip" id="btn-afford" onclick="updateMapMode('afford')">💸 Affordability</span>
    </div>
</header>

<div id="home-view">
    <div id="main-map"></div>
    <div class="map-legend">
        <strong id="legend-title">Rating Categories</strong><br>
        <div class="legend-item"><span style="font-size:14px; text-shadow:0 0 2px #000;">⭐</span> 4.1+ (Elite)</div>
        <div class="legend-item"><span class="dot-legend" style="background:#2ecc71"></span> 3.5 - 4.0 (Very Good)</div>
        <div class="legend-item"><span class="dot-legend" style="background:#f1c40f"></span> 3.0 - 3.4 (Good)</div>
        <div class="legend-item"><span class="dot-legend" style="background:#e67e22"></span> &lt; 3.0 (Niche)</div>
    </div>
</div>
