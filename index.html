<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greek Island Odyssey | Topo Edition</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { 
            --greek-blue: #005BAE; 
            --sand: #fdf5e6; 
            --accent: #ff7f50; 
            --star-gold: #ffcc00; 
        }
        
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: var(--sand); }
        
        header { 
            background: var(--greek-blue); color: white; padding: 15px; 
            text-align: center; position: sticky; top: 0; z-index: 2000;
        }
        header h1 { cursor: pointer; margin: 0; }

        /* Quick Menu Styling */
        .quick-menu { display: flex; justify-content: center; gap: 8px; margin-top: 15px; flex-wrap: wrap; }
        .vibe-chip {
            background: rgba(255,255,255,0.2); border: 1px solid white; color: white;
            padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; transition: 0.3s;
        }
        .vibe-chip:hover { background: var(--accent); border-color: var(--accent); }

        #islandSearch { 
            width: 90%; max-width: 400px; padding: 10px 20px; border-radius: 25px; 
            border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); outline: none; margin-top: 10px;
        }
        
        #home-view { height: calc(100vh - 220px); width: 100%; display: block; position: relative; }
        #main-map { height: 100%; width: 100%; background: #aad3df; }

        #detail-view { 
            display: none; padding: 2rem; max-width: 850px; margin: 30px auto; 
            background: white; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); 
        }

        .back-btn { background: var(--accent); color: white; border: none; padding: 10px 25px; border-radius: 30px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }

        .rating-box { background: #fcfaf2; padding: 20px; border-radius: 15px; margin: 20px 0; border: 1px solid #eee; }
        .rating-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .stars-outer { position: relative; display: inline-block; font-size: 22px; color: #ddd; }
        .stars-inner { position: absolute; top: 0; left: 0; white-space: nowrap; overflow: hidden; width: 0; color: var(--star-gold); }
        .stars-outer::before, .stars-inner::before { content: "★★★★★"; }

        footer { background: #333; color: #aaa; text-align: center; padding: 10px; font-size: 0.75rem; }
    </style>
</head>
<body>

<header>
    <h1 onclick="showHome()">Greek Island Odyssey 🏝️</h1>
    <input type="text" id="islandSearch" placeholder="Search for your next adventure..." onkeyup="filterIslands()">
    <div class="quick-menu">
        <span class="vibe-chip" onclick="showDetail('milos')">🌊 For Beach Lovers</span>
        <span class="vibe-chip" onclick="showDetail('rhodes')">🏛️ For History Buffs</span>
        <span class="vibe-chip" onclick="showDetail('mykonos')">💃 For Party Animals</span>
        <span class="vibe-chip" onclick="showDetail('santorini')">🚢 For Easy Access</span>
    </div>
</header>

<div id="home-view">
    <div id="main-map"></div>
</div>

<div id="detail-view">
    <button class="back-btn" onclick="showHome()">← Back to Map</button>
    <div style="display:flex; justify-content:space-between; align-items: baseline;">
        <h1 id="island-name" style="color:var(--greek-blue); font-size: 2.5rem; margin:0;"></h1>
        <h2 id="island-greek" style="color:#aaa; font-weight:normal;"></h2>
    </div>
    <div class="rating-box">
        <div class="rating-row"><span>🏖️ Beach Quality</span><div class="stars-outer"><div id="star-beach" class="stars-inner"></div></div></div>
        <div class="rating-row"><span>🏛️ History & Culture</span><div class="stars-outer"><div id="star-hist" class="stars-inner"></div></div></div>
        <div class="rating-row"><span>🍷 Nightlife</span><div class="stars-outer"><div id="star-night" class="stars-inner"></div></div></div>
        <div class="rating-row"><span>🚢 Accessibility</span><div class="stars-outer"><div id="star-access" class="stars-inner"></div></div></div>
    </div>
</div>

<footer>
    &copy; 2026 Greek Island Odyssey | <span id="version-display">Loading...</span>
</footer>

<script>
    // VERSION TRACKER
    const VERSION_ID = "v2.5 - OpenTopo + 10 New Islands";

    const islandData = {
        // Original 6
        "milos": { name: "Milos", greek: "Μήλος", lat: 36.68, lng: 24.41, beach: 5.0, hist: 3.5, night: 2.5, access: 3.5 },
        "rhodes": { name: "Rhodes", greek: "Ρόδος", lat: 36.18, lng: 27.92, beach: 4.5, hist: 5.0, night: 4.0, access: 5.0 },
        "mykonos": { name: "Mykonos", greek: "Μύκονος", lat: 37.44, lng: 25.33, beach: 4.5, hist: 3.0, night: 5.0, access: 4.5 },
        "corfu": { name: "Corfu", greek: "Κέρκυρα", lat: 39.62, lng: 19.85, beach: 4.0, hist: 5.0, night: 4.0, access: 5.0 },
        "crete": { name: "Crete", greek: "Κρήτη", lat: 35.2, lng: 24.8, beach: 5.0, hist: 5.0, night: 4.0, access: 5.0 },
        "lesvos": { name: "Lesvos", greek: "Λέσβος", lat: 39.2, lng: 26.2, beach: 4.0, hist: 5.0, night: 3.0, access: 4.0 },
        
        // 10 NEW ISLANDS
        "santorini": { name: "Santorini", greek: "Σαντορίνη", lat: 36.41, lng: 25.42, beach: 3.5, hist: 4.5, night: 4.5, access: 5.0 },
        "naxos": { name: "Naxos", greek: "Νάξος", lat: 37.10, lng: 25.48, beach: 5.0, hist: 4.5, night: 3.5, access: 4.0 },
        "zakynthos": { name: "Zakynthos", greek: "Ζάκυνθος", lat: 37.78, lng: 20.89, beach: 5.0, hist: 3.0, night: 4.5, access: 4.0 },
        "samos": { name: "Samos", greek: "Σάμος", lat: 37.75, lng: 26.83, beach: 4.0, hist: 4.5, night: 3.5, access: 4.0 },
        "kos": { name: "Kos", greek: "Κως", lat: 36.89, lng: 27.28, beach: 4.5, hist: 4.5, night: 4.0, access: 4.5 },
        "hydra": { name: "Hydra", greek: "Ύδρα", lat: 37.33, lng: 23.46, beach: 3.0, hist: 4.5, night: 4.0, access: 4.0 },
        "paros": { name: "Paros", greek: "Πάρος", lat: 37.08, lng: 25.15, beach: 4.5, hist: 4.0, night: 4.5, access: 4.5 },
        "skiathos": { name: "Skiathos", greek: "Σκιάθος", lat: 39.16, lng: 23.48, beach: 5.0, hist: 2.5, night: 4.5, access: 4.0 },
        "ikaria": { name: "Ikaria", greek: "Ικαρία", lat: 37.60, lng: 26.10, beach: 4.0, hist: 3.5, night: 5.0, access: 3.0 },
        "ithaca": { name: "Ithaca", greek: "Ιθάκη", lat: 38.41, lng: 20.66, beach: 4.0, hist: 5.0, night: 2.5, access: 3.0 }
    };

    let mainMap;
    const markerStore = {};

    window.onload = function() {
        document.getElementById('version-display').innerText = "Current Version: " + VERSION_ID;
        initMap();
    };

    function initMap() {
        mainMap = L.map('main-map').setView([38.3, 24.5], 7);

        // DIRECT OPENTOPO LINK (STABLE)
        L.tileLayer('https://tile.opentopomap.org/{z}/{x}/{y}.png', {
            maxZoom: 17,
            attribution: '© OpenTopoMap'
        }).addTo(mainMap);

        Object.keys(islandData).forEach(key => {
            const d = islandData[key];
            const marker = L.circleMarker([d.lat, d.lng], {
                radius: 12, fillColor: "#005BAE", color: "#fff", weight: 2, fillOpacity: 0.95
            }).addTo(mainMap);
            marker.on('click', () => showDetail(key));
            markerStore[key] = { marker, name: d.name.toLowerCase() };
        });
    }

    function filterIslands() {
        const query = document.getElementById('islandSearch').value.toLowerCase();
        Object.keys(markerStore).forEach(key => {
            const item = markerStore[key];
            const match = item.name.includes(query);
            item.marker.setStyle({ opacity: match ? 1 : 0.1, fillOpacity: match ? 0.95 : 0.1 });
        });
    }

    function setStars(elementId, rating) {
        document.getElementById(elementId).style.width = (rating / 5 * 100) + "%";
    }

    function showDetail(id) {
        const data = islandData[id];
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('detail-view').style.display = 'block';
        window.scrollTo(0,0);
        document.getElementById('island-name').innerText = data.name;
        document.getElementById('island-greek').innerText = data.greek;
        setStars('star-beach', data.beach);
        setStars('star-hist', data.hist);
        setStars('star-night', data.night);
        setStars('star-access', data.access);
    }

    function showHome() {
        document.getElementById('home-view').style.display = 'block';
        document.getElementById('detail-view').style.display = 'none';
        setTimeout(() => { mainMap.invalidateSize(); }, 200);
    }
</script>

</body>
</html>
